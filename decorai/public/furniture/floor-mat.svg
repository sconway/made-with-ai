<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 30" fill="none" stroke="#333" stroke-width="1">
  <!-- Outer mat shape with rounded corners -->
  <rect x="0" y="0" width="20" height="30" rx="3"/>
  <!-- Woven/braided texture - diagonal stripes -->
  <line x1="4" y1="0" x2="4" y2="30"/>
  <line x1="8" y1="0" x2="8" y2="30"/>
  <line x1="12" y1="0" x2="12" y2="30"/>
  <line x1="16" y1="0" x2="16" y2="30"/>
  <!-- Cross weave -->
  <line x1="0" y1="6" x2="20" y2="6"/>
  <line x1="0" y1="12" x2="20" y2="12"/>
  <line x1="0" y1="18" x2="20" y2="18"/>
  <line x1="0" y1="24" x2="20" y2="24"/>
  <!-- Fringe/tassels at bottom edge -->
  <line x1="3" y1="28" x2="3" y2="30"/>
  <line x1="7" y1="28" x2="7" y2="30"/>
  <line x1="10" y1="28" x2="10" y2="30"/>
  <line x1="13" y1="28" x2="13" y2="30"/>
  <line x1="17" y1="28" x2="17" y2="30"/>
</svg>

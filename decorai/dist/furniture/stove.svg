<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25" fill="none" stroke="#333" stroke-width="1" stroke-linejoin="round">
  <!-- Cooktop outer -->
  <rect x="0" y="0" width="25" height="25" rx="1"/>
  <!-- Control panel strip -->
  <line x1="0" y1="4" x2="25" y2="4" stroke="#666" stroke-width="0.7"/>
  <!-- Control knobs -->
  <circle cx="3.5" cy="2" r="0.8" stroke="#999" stroke-width="0.5"/>
  <circle cx="9.5" cy="2" r="0.8" stroke="#999" stroke-width="0.5"/>
  <circle cx="15.5" cy="2" r="0.8" stroke="#999" stroke-width="0.5"/>
  <circle cx="21.5" cy="2" r="0.8" stroke="#999" stroke-width="0.5"/>
  <!-- Front-left burner (large) -->
  <circle cx="7" cy="16" r="3.8"/>
  <circle cx="7" cy="16" r="2.2" stroke="#999" stroke-width="0.5"/>
  <!-- Front-right burner (large) -->
  <circle cx="18" cy="16" r="3.8"/>
  <circle cx="18" cy="16" r="2.2" stroke="#999" stroke-width="0.5"/>
  <!-- Back-left burner (small) -->
  <circle cx="7" cy="8.5" r="2.6"/>
  <circle cx="7" cy="8.5" r="1.4" stroke="#999" stroke-width="0.5"/>
  <!-- Back-right burner (small) -->
  <circle cx="18" cy="8.5" r="2.6"/>
  <circle cx="18" cy="8.5" r="1.4" stroke="#999" stroke-width="0.5"/>
</svg>

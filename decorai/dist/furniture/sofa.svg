  <rect x="35.5" y="7" width="25.5" height="5.5" rx="1" stroke="#666" stroke-width="0.7"/>
  <!-- Seat cushions -->
  <rect x="9.5" y="13.5" width="25" height="15" rx="1.5" stroke="#666" stroke-width="0.7"/>
  <rect x="35.5" y="13.5" width="25" height="15" rx="1.5" stroke="#666" stroke-width="0.7"/>
</svg>

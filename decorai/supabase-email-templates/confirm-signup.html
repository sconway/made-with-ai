<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm your DecorAI account</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
</head>
<body style="margin:0; padding:0; background-color:#f3f4f6; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f3f4f6;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 480px; background-color:#ffffff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);">
          <tr>
            <td style="padding: 40px 32px;">
              <!-- Logo / Brand -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                <tr>
                  <td style="padding-bottom: 24px;">
                    <h1 style="margin:0; font-size: 24px; font-weight: 700; color:#6366f1;">DecorAI</h1>
                    <p style="margin: 4px 0 0 0; font-size: 14px; color:#6b7280;">Reimagine Your Space</p>
                  </td>
                </tr>
              </table>
              <!-- Content -->
              <h2 style="margin:0 0 16px 0; font-size: 20px; font-weight: 600; color:#1f2937;">Confirm your email</h2>
              <p style="margin:0 0 24px 0; font-size: 16px; line-height: 1.5; color:#4b5563;">Thanks for signing up. Click the button below to confirm your email and start using DecorAI.</p>
              <!-- Button -->
              <table role="presentation" cellspacing="0" cellpadding="0" width="100%">
                <tr>
                  <td>
                    <a href="{{ .ConfirmationURL }}" target="_blank" rel="noopener noreferrer" style="display: inline-block; padding: 14px 28px; background-color:#6366f1; color:#ffffff; font-size: 16px; font-weight: 600; text-decoration: none; border-radius: 8px;">Confirm email</a>
                  </td>
                </tr>
              </table>
              <p style="margin: 24px 0 0 0; font-size: 14px; color:#6b7280;">If you didn’t create an account with DecorAI, you can ignore this email.</p>
              <!-- Footer -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin-top: 32px; padding-top: 24px; border-top: 1px solid #e5e7eb;">
                <tr>
                  <td style="font-size: 12px; color:#9ca3af;">DecorAI — AI-Powered Interior Design</td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
